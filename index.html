<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>육하원칙 카드 뒤집기</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Gaegu:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{ --c-who:#ef4444; --c-where:#3b82f6; --c-what:#16a34a; --c-how:#f59e0b; --c-why:#8b5cf6; --ink:#3a3a55; }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{
    font-family:'Gaegu',sans-serif;color:var(--ink);min-height:100vh;
    background:
      radial-gradient(circle at 12% 18%, rgba(255,225,150,.55), transparent 38%),
      radial-gradient(circle at 88% 12%, rgba(160,210,255,.55), transparent 40%),
      radial-gradient(circle at 78% 88%, rgba(200,180,255,.5), transparent 42%),
      radial-gradient(circle at 20% 85%, rgba(180,245,210,.5), transparent 40%),
      #fdfcf7;
    padding:20px 14px 50px;
  }
  header{text-align:center;margin:6px auto 16px;max-width:1100px;}
  header h1{font-family:'Jua',sans-serif;font-size:clamp(26px,5vw,46px);color:#2f2f4a;
    letter-spacing:-1px;text-shadow:2px 3px 0 #fff,4px 6px 0 rgba(0,0,0,.06);}
  header p{font-size:clamp(15px,2.4vw,20px);color:#7a7a92;margin-top:2px;}

  .toolbar{max-width:1100px;margin:0 auto 16px;display:flex;flex-wrap:wrap;gap:10px;
    align-items:center;justify-content:center;}
  .group{display:flex;gap:6px;flex-wrap:wrap;align-items:center;background:rgba(255,255,255,.7);
    border:3px solid #fff;border-radius:20px;padding:7px 9px;box-shadow:0 6px 18px rgba(120,120,160,.14);}
  .group .lbl{font-family:'Jua',sans-serif;font-size:14px;color:#9a9ab0;padding:0 4px;}
  .chip{font-family:'Jua',sans-serif;font-size:16px;border:none;cursor:pointer;padding:7px 14px;
    border-radius:14px;background:#eef0f6;color:#6b6b85;transition:transform .12s,background .2s,color .2s;}
  .chip:hover{transform:translateY(-2px);}
  .chip.active{background:#ffd34d;color:#5a4a10;box-shadow:0 4px 0 #e0b32f;}
  .pill{font-family:'Jua',sans-serif;font-size:17px;cursor:pointer;border:none;padding:11px 20px;
    border-radius:18px;color:#fff;background:linear-gradient(135deg,#ff9a6b,#ff6b9d);
    box-shadow:0 5px 0 #d9486f;transition:transform .12s;}
  .pill:hover{transform:translateY(-2px);}
  .pill:active{transform:translateY(2px);box-shadow:0 3px 0 #d9486f;}

  .hint-tip{max-width:1100px;margin:0 auto 16px;text-align:center;font-size:16px;color:#8a8aa0;}

  /* 작은 이름 카드 그리드 (촘촘) */
  .grid{max-width:1100px;margin:0 auto;display:grid;
    grid-template-columns:repeat(auto-fill,minmax(132px,1fr));gap:11px;}
  .mini{border:3px solid #fff;border-radius:18px;padding:16px 10px;cursor:pointer;text-align:center;
    display:flex;flex-direction:column;justify-content:center;gap:5px;min-height:92px;
    box-shadow:0 5px 14px rgba(110,110,160,.16);transition:transform .12s, box-shadow .12s;
    font-family:'Gaegu',sans-serif;}
  .mini:hover{transform:translateY(-3px);box-shadow:0 9px 18px rgba(110,110,160,.22);}
  .mini:active{transform:translateY(0);}
  .mini .mini-cat{font-size:13px;color:rgba(60,60,90,.5);font-weight:700;}
  .mini .mini-name{font-family:'Jua',sans-serif;font-size:22px;color:#2f2f4a;line-height:1.12;}
  .mini .mini-q{font-size:20px;line-height:1;}
  .mini.opened{border-color:#ffd34d;box-shadow:0 6px 15px rgba(224,179,47,.32);}

  /* 확대 오버레이 */
  .overlay{position:fixed;inset:0;background:rgba(45,45,65,.55);backdrop-filter:blur(2px);
    display:flex;align-items:center;justify-content:center;padding:18px;z-index:50;
    opacity:0;visibility:hidden;transition:opacity .2s;}
  .overlay.show{opacity:1;visibility:visible;}
  .big-card{position:relative;width:100%;max-width:560px;max-height:94vh;overflow:auto;
    background:#fff;border:6px solid #fff;border-radius:30px;padding:26px 24px 20px;
    box-shadow:0 20px 50px rgba(40,40,70,.35);transform:scale(.92);transition:transform .22s;
    display:flex;flex-direction:column;align-items:center;text-align:center;}
  .overlay.show .big-card{transform:scale(1);}
  .x{position:absolute;top:14px;right:16px;border:none;cursor:pointer;background:#f0f0f6;
    width:42px;height:42px;border-radius:50%;font-size:20px;color:#7a7a92;line-height:1;
    display:flex;align-items:center;justify-content:center;box-shadow:0 3px 0 #d8d8e4;}
  .x:active{transform:translateY(2px);box-shadow:0 1px 0 #d8d8e4;}
  .big-cat{font-family:'Jua',sans-serif;font-size:15px;color:#fff;background:#b6b6cc;
    padding:4px 16px;border-radius:20px;margin-bottom:12px;}
  .big-photo{width:150px;height:150px;object-fit:cover;background:#fff;border:5px solid #fff;
    box-shadow:0 6px 14px rgba(0,0,0,.14);}
  .big-photo.round{border-radius:50%;} .big-photo.square{border-radius:24px;}
  .big-emoji{font-size:110px;line-height:1;}
  .big-name{font-family:'Jua',sans-serif;font-size:38px;color:#2f2f4a;margin-top:12px;}
  .big-tag{font-size:20px;color:#7a7a92;margin:2px 0 16px;}
  .big-rows{display:flex;flex-direction:column;gap:11px;width:100%;text-align:left;}
  .row{display:flex;gap:12px;align-items:flex-start;}
  .tag-b{font-family:'Jua',sans-serif;font-size:16px;color:#fff;padding:6px 0;border-radius:16px;
    flex:0 0 66px;text-align:center;box-shadow:0 3px 0 rgba(0,0,0,.12);margin-top:2px;}
  .row .txt{font-size:20px;line-height:1.3;color:#454560;flex:1;}
  .b-who{background:var(--c-who);} .b-where{background:var(--c-where);} .b-what{background:var(--c-what);}
  .b-how{background:var(--c-how);} .b-why{background:var(--c-why);}
  .nav{display:flex;gap:12px;width:100%;margin-top:20px;}
  .nav button{flex:1;font-family:'Jua',sans-serif;font-size:19px;border:none;cursor:pointer;
    padding:14px 0;border-radius:18px;color:#fff;background:linear-gradient(135deg,#8fd3ff,#6aa8ff);
    box-shadow:0 5px 0 #4787d6;transition:transform .12s;}
  .nav button:active{transform:translateY(2px);box-shadow:0 3px 0 #4787d6;}

  footer{max-width:1100px;margin:30px auto 0;text-align:center;color:#b0b0c2;font-size:15px;}

  @media (max-width:520px){
    .grid{grid-template-columns:repeat(auto-fill,minmax(108px,1fr));gap:9px;}
    .mini{min-height:78px;padding:12px 6px;}
    .mini .mini-name{font-size:19px;}
    .big-photo{width:120px;height:120px;} .big-name{font-size:32px;}
    .row .txt{font-size:18px;}
  }
</style>
</head>
<body>
  <header>
    <h1>🔮 육하원칙 카드 뒤집기</h1>
    <p>카드를 톡 누르면 크게 펼쳐져요. 누가·어디서·무엇을·어떻게·왜로 알아봐요!</p>
  </header>

  <div class="toolbar">
    <div class="group" id="catGroup"><span class="lbl">종류</span></div>
    <button class="pill" id="shuffleBtn">🔀 카드 섞기</button>
    <button class="pill" id="resetBtn" style="background:linear-gradient(135deg,#b6a6ff,#8b7bff);box-shadow:0 5px 0 #6a5acc;">🔄 처음부터</button>
  </div>

  <div class="hint-tip">어떤 친구일지 종류만 보여요! 카드를 톡 누르면 정체가 나와요. 한 번 열어본 카드는 이름이 보여요.</div>
  <div class="grid" id="grid"></div>

  <footer>누가 · 어디서 · 무엇을 · 어떻게 · 왜 — 다섯 가지로 생각해요 🌱</footer>

  <div class="overlay" id="overlay">
    <div class="big-card" id="bigCard">
      <button class="x" id="xBtn" aria-label="닫기">✕</button>
      <div class="big-body" id="modalBody" style="display:flex;flex-direction:column;align-items:center;width:100%;"></div>
    </div>
  </div>

   h:{who:"가족이나 친구들이랑 재미있는 시간을 보내러 가는 곳이야!", where:"커다란 쇼핑몰 안이나 번화가 건물 위층에 자주 있어.", what:"달콤한 팝콘을 먹으면서 아주아주 커다란 화면을 봐.", how:"표를 사고 들어가서, 불이 꺼지면 조용히 자리에 앉아있어야 해.", why:"집의 텔레비전보다 훨씬 크고 멋진 소리로 푹 빠져서 보려고!"}},
];

const CATS = ["전체","인물","직업","탈것","동물","장소"];
const ROWS = [["who","누가","b-who"],["where","어디서","b-where"],["what","무엇을","b-what"],["how","어떻게","b-how"],["why","왜","b-why"]];
let state = { cat:"전체", order:CARDS.map((_,i)=>i) };
let view = [];   // 현재 보이는 카드 (CARDS 인덱스) 목록
let pos = -1;    // view 안에서 열린 카드 위치
let opened = new Set();   // 한 번이라도 펼쳐 본 카드

const grid=document.getElementById("grid");
const overlay=document.getElementById("overlay");
const modalBody=document.getElementById("modalBody");

function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

// 카테고리 칩
const catGroup=document.getElementById("catGroup");
CATS.forEach(c=>{
  const b=document.createElement("button");
  b.className="chip"+(c==="전체"?" active":"");
  b.textContent=c; b.dataset.cat=c;
  b.addEventListener("click",()=>{
    state.cat=c;
    [...catGroup.querySelectorAll(".chip")].forEach(x=>x.classList.toggle("active",x.dataset.cat===c));
    closeCard(); renderGrid();
  });
  catGroup.appendChild(b);
});
document.getElementById("shuffleBtn").addEventListener("click",()=>{
  for(let i=state.order.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[state.order[i],state.order[j]]=[state.order[j],state.order[i]];}
  closeCard(); renderGrid();
});
document.getElementById("resetBtn").addEventListener("click",()=>{
  opened.clear(); closeCard(); renderGrid();
});

function renderGrid(){
  view = state.order.filter(i=> state.cat==="전체" || CARDS[i].cat===state.cat);
  grid.innerHTML = view.map((ci,p)=>{
    const c=CARDS[ci]; const op=opened.has(ci);
    const head = op ? `<span class="mini-cat">${c.cat}</span>` : `<span class="mini-q">❓</span>`;
    const main = op ? esc(c.name) : c.cat;
    return `<button class="mini ${op?"opened":""}" style="background:linear-gradient(160deg,#ffffff,${c.color})" data-p="${p}">
      ${head}<span class="mini-name">${main}</span></button>`;
  }).join("");
}
grid.addEventListener("click",e=>{
  const b=e.target.closest(".mini"); if(!b) return;
  openAt(+b.dataset.p);
});

function openAt(p){
  pos=p;
  opened.add(view[pos]);
  const c=CARDS[view[pos]];
  const rows=ROWS.map(([k,label,cls])=>
    `<div class="row"><span class="tag-b ${cls}">${label}</span><span class="txt">${esc(c.h[k])}</span></div>`).join("");
  const photo=c.img?`<img class="big-photo ${c.cat==="동물"?"square":"round"}" src="${c.img}" alt="">`:`<span class="big-emoji">${c.emoji}</span>`;
  modalBody.innerHTML=`<span class="big-cat">${c.cat}</span>${photo}
    <div class="big-name">${esc(c.name)}</div><div class="big-tag">${esc(c.tag)}</div>
    <div class="big-rows">${rows}</div>`;
  overlay.classList.add("show");
  document.body.style.overflow="hidden";
}
function closeCard(){ overlay.classList.remove("show"); document.body.style.overflow=""; pos=-1; renderGrid(); }
document.getElementById("xBtn").addEventListener("click",closeCard);
overlay.addEventListener("click",e=>{ if(e.target===overlay) closeCard(); });
document.addEventListener("keydown",e=>{
  if(!overlay.classList.contains("show"))return;
  if(e.key==="Escape")closeCard();
});

renderGrid();
</script>
</body>
</html>
